name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Change Impact Audit check
        if: |
          github.actor != 'dependabot[bot]' &&
          !contains(github.event.head_commit.message, '[skip ci]') &&
          !startsWith(github.event.head_commit.message, 'chore: auto-version') &&
          !startsWith(github.event.head_commit.message, 'Merge pull request') &&
          !startsWith(github.event.head_commit.message, 'Merge branch')
        env:
          PR_BODY: ${{ github.event.pull_request.body || '' }}
          COMMIT_MSG: ${{ github.event.head_commit.message || '' }}
        run: |
          COMBINED="$PR_BODY $COMMIT_MSG"
          HAS_CHANGE=$(echo "$COMBINED" | grep -ci 'CHANGE:' || true)
          HAS_CLASS=$(echo "$COMBINED" | grep -ci 'CLASSIFICATION:' || true)
          HAS_VERDICT=$(echo "$COMBINED" | grep -ci 'Verdict:' || true)
          if [ "$HAS_CHANGE" -gt 0 ] && [ "$HAS_CLASS" -gt 0 ] && [ "$HAS_VERDICT" -gt 0 ]; then
            echo "Change Impact Audit found in commit/PR"
          else
            echo "::warning::No Change Impact Audit found in commit message or PR body. Every non-trivial change should include CHANGE:/CLASSIFICATION:/Verdict: markers per CLAUDE.md."
          fi

      - name: Security audit
        run: pnpm audit --prod --audit-level=high

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Bundle size
        run: du -sh .next/static/chunks/ | tee bundle-size.txt
