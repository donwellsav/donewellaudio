name: ML Training Pipeline

on:
  # Manual trigger with version input
  workflow_dispatch:
    inputs:
      model_version:
        description: 'Model version (e.g. v2, v3)'
        required: true
        default: 'v2'
      min_samples:
        description: 'Minimum labeled samples required'
        required: false
        default: '100'

  # Scheduled: check weekly if enough data has accumulated
  schedule:
    - cron: '0 6 * * 1'  # Monday 6am UTC

jobs:
  export-and-train:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install numpy onnx supabase

      - name: Export training data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/ml/export_training_data.py \
            --output data/training.csv \
            --min-events ${{ github.event.inputs.min_samples || '100' }}

      - name: Check data sufficiency
        id: check_data
        run: |
          if [ ! -f data/training.csv ]; then
            echo "sufficient=false" >> "$GITHUB_OUTPUT"
            echo "No training data exported"
            exit 0
          fi
          ROWS=$(tail -n +2 data/training.csv | wc -l)
          echo "rows=$ROWS" >> "$GITHUB_OUTPUT"
          if [ "$ROWS" -lt "${{ github.event.inputs.min_samples || '100' }}" ]; then
            echo "sufficient=false" >> "$GITHUB_OUTPUT"
            echo "Only $ROWS samples — need more labeled data"
          else
            echo "sufficient=true" >> "$GITHUB_OUTPUT"
            echo "$ROWS samples available for training"
          fi

      - name: Train model
        if: steps.check_data.outputs.sufficient == 'true'
        run: |
          VERSION="${{ github.event.inputs.model_version || 'v2' }}"
          python scripts/ml/train_fp_filter.py \
            --input data/training.csv \
            --version "$VERSION" \
            --min-samples ${{ github.event.inputs.min_samples || '100' }}

      - name: Create PR with new model
        if: steps.check_data.outputs.sufficient == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.model_version || 'v2' }}"
          BRANCH="ml/model-${VERSION}"
          ROWS="${{ steps.check_data.outputs.rows }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add public/models/
          git commit -m "ml: train ktr-fp-${VERSION} on ${ROWS} labeled events

          Trained FP filter model from production user feedback data.
          See public/models/manifest.json for metrics."

          git push origin "$BRANCH"

          gh pr create \
            --title "ML: Update FP filter to ${VERSION} (${ROWS} samples)" \
            --body "## ML Model Update

          - **Version:** ktr-fp-${VERSION}
          - **Training samples:** ${ROWS}
          - **Trigger:** ${{ github.event_name }}

          ### Changes
          - Updated ONNX model at \`public/models/ktr-fp-filter-${VERSION}.onnx\`
          - Updated \`public/models/manifest.json\`

          ### Verification
          - [ ] Check manifest.json metrics (val_loss, precision, recall)
          - [ ] Deploy to preview and test with known FP scenarios
          - [ ] Compare FP rate vs previous model version

          🤖 Generated by ML Training Pipeline" \
            --base main
